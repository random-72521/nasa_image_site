<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/nasa_image_site/favicon.svg" />
    <link href="https://fonts.cdnfonts.com/css/orbitron" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
                

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NASA APOD</title>
    <script type="module" crossorigin src="/nasa_image_site/assets/index-Ch_JNe3i.js"></script>
    <link rel="stylesheet" crossorigin href="/nasa_image_site/assets/index-Bp_Cz8fN.css">
  </head>

  <body style = "display: flex; justify-content: center; align-items: center; flex-direction: column">

    <p style = "align-self: flex-start;">NASA - Astronomy Picture of the Day</p>
    <div id = "app" style = "display: flex; width: 100%; height: 880px; justify-content:center; align-items: center; 
    flex-direction: column">

      <p id = "loading">Loading...</p>

      <div id = "imageArea" style = "display: flex; height: 70%; width:85%; flex-direction: column; border: 1px solid #324447">

        <div id = "timeTitle" style = "display: flex; flex-direction: row; justify-content: space-between; padding: 8px">
          <p id = "title">Title</p>
          <p id = "time" style = "display: flex; align-self: flex-end">Time</p>
        </div>

        <div id = "imageDiv" style = "display:flex; flex-direction: column;">
          <div id = "bracketDivs" style = "display: flex; flex-direction:row; height: 50px; justify-content: space-between;
          padding: 16px">
            <div class = "bracket-left"></div>
            <div class = "bracket-right"></div>
          </div>
          
          <div id = "image" style = "display: flex; height: 450px; width: 950px; transform: translateY(-50px);
          align-self: center">
            <div class = "scanline"></div>
          </div>

          <div id = "date" style = "display: flex; align-self: flex-start; background-color: rgba(178, 129, 13, 0.5); color: orange;
          width: 300px; height: 35px; transform: translateY(-25px) translateX(15px); align-items: center; justify-content: center;
          border-radius: 4px; border: 1px solid rgba(225, 172, 15, 0.7)">
            <p>Date</p>
          </div>

        </div>

      </div>

    </div>

    <div style = "display: flex; width: 70%; height: 500px; transform: translateY(-225px);">

      <div style = "display: flex; width: 750px; font-family: 'Space Mono', monospace; 
        align-items: center; justify-content: center; align-self: flex-start; border: 1px solid orange;
        background-color: rgba(225, 172, 15, 0.36); padding: 2px">
            <p id = "info" style = "color: orange">----------------------</p>
      </div>

      <div style = "display: flex; flex-direction: row; padding: 8px; gap: 8px; align-self: flex-end;
      width: 600px; align-items: center; justify-content: center; justify-self: flex-end;">

        
        <div style = "display: flex; flex-direction: column; align-items: center; width: fit-content; height: fit-content; align-self: flex-end;
        align-items: center; justify-content: center; transform: translateX(150px); gap: 16px; padding: 8px">

          <div style = "display: flex; flex-direction: column; gap: 10px">
            <table style = "table-layout: auto; width: auto; font-family: 'Space Mono', monospace">
              <tr>
                <td>Media Type</td>
                <td id = "media-type">-----</td>
              </tr>
              <tr>
                <td>Date</td>
                <td id = "image-date">-/--/----</td>
              </tr>
              <tr>
                <td>Copyright</td>
                <td id = "credits">-----------------------</td>
              </tr>
            </table>
          </div>


          <div style = "display: flex; flex-direction: column; gap: 10px">

            <a id = "download" download style = "text-decoration: none" target = "_blank">
              <div style = "display: flex; border: 1px solid #2d4347; width: 320px; height: 80px; align-items: center;
              justify-content: center; background-color: #10222d; cursor: pointer; color: #56c4d8">
                <p>Go to Image/Video</p>
              </div>
            </a>

            <div style = "height: 25px"></div>

            <div style = "display: flex; border: 1px solid #2d4347; width: 320px; height: 180px; align-items: center;
              justify-content: center; color: #56c4d8; background-color: #10222d; flex-direction: column;">
              <p>Archive</p>
              <input id = "date-picker" type = "date">

              <div id = "archive" style = "display: flex; border: 1px solid #2d4347; width: 160px; height: 40px; align-items: center;
              justify-content: center; color: #56c4d8; background-color: #10222d; cursor: pointer; flex-direction: column;
              transform: translateY(10px)">
                Enter
              </div>

            </div>

          </div>
        </div>
      </div>
    </div>



  </body>
</html>
